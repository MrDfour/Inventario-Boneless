name: Build Native Apps (Android & Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión del lanzamiento (ej: 1.0.0)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'Notas de la versión (opcional)'
        required: false
        default: 'Lanzamiento manual desde GitHub Actions'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Update package.json version
        if: github.event_name == 'workflow_dispatch'
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Set Android version metadata
        run: |
          VERSION_NAME="${{ github.event.inputs.version || '1.0.0' }}"
          VERSION_CODE="${{ github.run_number }}"
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${VERSION_NAME}\"/" android/app/build.gradle

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK (Release Unsigned)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename Signed APK
        run: |
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} android/app/build/outputs/apk/release/Inventario-Boneless.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Inventario-Boneless-Android-APK
          path: android/app/build/outputs/apk/release/Inventario-Boneless.apk
          if-no-files-found: error

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Update package.json version
        if: github.event_name == 'workflow_dispatch'
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Build Web App
        run: npm run build

      - name: Build Windows Installer (EXE)
        run: npm run electron:build -- --publish never

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Inventario-Boneless-Windows-EXE
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: Inventario-Boneless-Android-APK
          path: ./artifacts

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: Inventario-Boneless-Windows-EXE
          path: ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Versión ${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_notes }}
          files: |
            ./artifacts/Inventario-Boneless.apk
            ./artifacts/*.exe
            ./artifacts/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
